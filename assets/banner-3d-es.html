<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Praxeology — 3D Governance Manifold</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #030510; overflow: hidden; font-family: 'Georgia', serif; }
  canvas { display: block; }
  #overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding-left: 5%;
  }
  #overlay h1 {
    font-size: 3.2vw;
    color: #E8E6DEee;
    font-weight: 400;
    letter-spacing: -0.02em;
    margin-bottom: 0.3em;
  }
  #overlay .subtitle {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 0.85vw;
    color: #7A8A9A;
    letter-spacing: 0.2em;
    margin-bottom: 1.5em;
  }
  #overlay .tagline {
    font-style: italic;
    font-size: 1vw;
    color: #5A6A7Aaa;
  }
  #tier-labels {
    position: absolute;
    right: 4%;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 2.5vh;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 0.7vw;
    letter-spacing: 0.15em;
  }
  #tier-labels .tier { opacity: 0.4; transition: opacity 0.3s; }
  #tier-labels .tier.exec { color: #C47A5A; }
  #tier-labels .tier.play { color: #9A7ABB; }
  #tier-labels .tier.proc { color: #5A8AAA; }
  #tier-labels .tier.doct { color: #3A6A9A; }
  #tier-labels .tier.strt { color: #1A4A7A; }
  #ball-label {
    position: absolute;
    font-family: 'Georgia', serif;
    font-size: 0.75vw;
    color: #E8C84A;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s;
    font-style: italic;
  }
</style>
</head>
<body>

<div id="overlay">
  <h1>praxeology</h1>
  <div class="subtitle">GOBERNANZA JERÁRQUICA PARA LA ACCIÓN CON PROPÓSITO</div>
  <div class="tagline">Cuanto más profundo el principio, más quieta el agua.</div>
</div>

<div id="tier-labels">
  <div class="tier exec">EXEC — AHORA</div>
  <div class="tier play">PLAYBOOK — PATRONES</div>
  <div class="tier proc">PROCEDIMIENTO — CÓMO</div>
  <div class="tier doct">DOCTRINA — QUÉ</div>
  <div class="tier strt">ESTRATEGIA — POR QUÉ</div>
</div>

<div id="ball-label"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

// === SCENE SETUP ===
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x030510);
scene.fog = new THREE.FogExp2(0x030510, 0.012);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(18, 14, 22);
camera.lookAt(0, -2, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.prepend(renderer.domElement);

// === LIGHTS ===
const ambientLight = new THREE.AmbientLight(0x1a2a4a, 0.6);
scene.add(ambientLight);

const topLight = new THREE.DirectionalLight(0x4A6EFF, 0.4);
topLight.position.set(5, 20, 10);
scene.add(topLight);

const essenceLight = new THREE.PointLight(0xE8C84A, 0.6, 30);
essenceLight.position.set(0, 8, 0);
scene.add(essenceLight);

const deepLight = new THREE.PointLight(0x1E2FA8, 0.3, 40);
deepLight.position.set(0, -8, 0);
scene.add(deepLight);

// === SURFACE PARAMETERS ===
const GRID = 80;
const SIZE = 20;
const geometry = new THREE.PlaneGeometry(SIZE, SIZE, GRID, GRID);
geometry.rotateX(-Math.PI / 2);

// Surface height function — slowly morphing landscape
function surfaceHeight(x, z, t) {
  const s = 0.3;
  return (
    2.5 * Math.sin(x * s + t * 0.15) * Math.cos(z * s + t * 0.12) +
    1.5 * Math.sin(x * s * 1.7 + z * s * 0.8 + t * 0.08) +
    1.0 * Math.cos(x * s * 0.5 + z * s * 1.3 - t * 0.1) +
    0.5 * Math.sin(x * s * 2.5 + t * 0.2) * Math.cos(z * s * 2.0 - t * 0.15)
  );
}

// Surface gradient (for ball physics)
function surfaceGradient(x, z, t) {
  const eps = 0.05;
  const hx1 = surfaceHeight(x + eps, z, t);
  const hx0 = surfaceHeight(x - eps, z, t);
  const hz1 = surfaceHeight(x, z + eps, t);
  const hz0 = surfaceHeight(x, z - eps, t);
  return { dx: (hx1 - hx0) / (2 * eps), dz: (hz1 - hz0) / (2 * eps) };
}

// Color by height — deep blue to storm orange
const colors = [];
const posArray = geometry.attributes.position.array;
for (let i = 0; i < posArray.length; i += 3) {
  colors.push(0.15, 0.2, 0.4); // placeholder, updated per frame
}
geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

const material = new THREE.MeshPhongMaterial({
  vertexColors: true,
  shininess: 40,
  transparent: true,
  opacity: 0.75,
  side: THREE.DoubleSide,
  wireframe: false,
});

const mesh = new THREE.Mesh(geometry, material);
scene.add(mesh);

// Wireframe overlay
const wireMat = new THREE.MeshBasicMaterial({
  color: 0x4A6EFF,
  wireframe: true,
  transparent: true,
  opacity: 0.06,
});
const wireMesh = new THREE.Mesh(geometry.clone(), wireMat);
scene.add(wireMesh);

// === BALL ===
const ballGeo = new THREE.SphereGeometry(0.35, 24, 24);
const ballMat = new THREE.MeshPhongMaterial({
  color: 0xE8C84A,
  emissive: 0xD4A017,
  emissiveIntensity: 0.5,
  shininess: 100,
});
const ball = new THREE.Mesh(ballGeo, ballMat);
scene.add(ball);

// Ball glow
const glowGeo = new THREE.SphereGeometry(0.6, 16, 16);
const glowMat = new THREE.MeshBasicMaterial({
  color: 0xE8C84A,
  transparent: true,
  opacity: 0.12,
});
const glow = new THREE.Mesh(glowGeo, glowMat);
scene.add(glow);

// Ball trail
const trailPoints = [];
const MAX_TRAIL = 120;
for (let i = 0; i < MAX_TRAIL; i++) trailPoints.push(new THREE.Vector3(0, 0, 0));
const trailGeo = new THREE.BufferGeometry().setFromPoints(trailPoints);
const trailMat = new THREE.LineBasicMaterial({ color: 0xD4A017, transparent: true, opacity: 0.2 });
const trail = new THREE.Line(trailGeo, trailMat);
scene.add(trail);

// Ball physics state
let bx = 0, bz = 0;
let bvx = 0, bvz = 0;
const GRAVITY = 0.014;
const DAMPING = 0.994;
const BOUNCE_FACTOR = 0.3;
const REPULSION_ZONE = 1.5; // distance from edge where repulsion kicks in
const REPULSION_STRENGTH = 0.006;

// === TIER LABEL TRACKING ===
const ballLabel = document.getElementById('ball-label');
const tiers = ['STRATEGY', 'DOCTRINE', 'PROCEDURE', 'PLAYBOOK', 'EXEC'];
const tierThresholds = [-2.5, -1.0, 0.5, 2.0, 4.0]; // height thresholds

function getTierName(h) {
  if (h < tierThresholds[0]) return 'Estrategia — Por qué';
  if (h < tierThresholds[1]) return 'Doctrina — Qué';
  if (h < tierThresholds[2]) return 'Procedimiento — Cómo';
  if (h < tierThresholds[3]) return 'Playbook — Ejecutar';
  return 'Exec — Ahora';
}

// === COLOR MAPPING ===
function heightToColor(h) {
  // Normalize h from roughly [-5, 5] to [0, 1]
  const t = Math.max(0, Math.min(1, (h + 5) / 10));

  // Deep navy → mid blue → teal → lavender → storm orange
  const colors = [
    [0.04, 0.08, 0.25],  // deep abyss (Strategy)
    [0.10, 0.18, 0.40],  // deep blue (Doctrine)
    [0.15, 0.30, 0.45],  // mid blue (Procedure)
    [0.30, 0.28, 0.50],  // lavender (Playbook)
    [0.55, 0.35, 0.25],  // storm orange (Exec)
  ];

  const idx = t * (colors.length - 1);
  const i = Math.floor(idx);
  const f = idx - i;
  const c0 = colors[Math.min(i, colors.length - 1)];
  const c1 = colors[Math.min(i + 1, colors.length - 1)];

  return [
    c0[0] + (c1[0] - c0[0]) * f,
    c0[1] + (c1[1] - c0[1]) * f,
    c0[2] + (c1[2] - c0[2]) * f,
  ];
}

// === ANIMATION ===
const clock = new THREE.Clock();
let trailIdx = 0;

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  // Update surface
  const pos = geometry.attributes.position.array;
  const col = geometry.attributes.color.array;
  const wirePos = wireMesh.geometry.attributes.position.array;

  for (let i = 0; i < pos.length; i += 3) {
    const x = pos[i];
    const z = pos[i + 2];
    const h = surfaceHeight(x, z, t);
    pos[i + 1] = h;
    wirePos[i + 1] = h;

    const [r, g, b] = heightToColor(h);
    col[i] = r;
    col[i + 1] = g;
    col[i + 2] = b;
  }

  geometry.attributes.position.needsUpdate = true;
  geometry.attributes.color.needsUpdate = true;
  geometry.computeVertexNormals();
  wireMesh.geometry.attributes.position.needsUpdate = true;

  // Ball physics — roll along surface
  const grad = surfaceGradient(bx, bz, t);
  bvx -= grad.dx * GRAVITY;
  bvz -= grad.dz * GRAVITY;
  bvx *= DAMPING;
  bvz *= DAMPING;

  bx += bvx;
  bz += bvz;

  // Soft repulsion near edges + hard clamp safety
  const halfSize = SIZE / 2 - 1;
  const edgeXp = halfSize - bx;
  const edgeXn = bx + halfSize;
  const edgeZp = halfSize - bz;
  const edgeZn = bz + halfSize;

  if (edgeXp < REPULSION_ZONE) bvx -= REPULSION_STRENGTH * (1 - edgeXp / REPULSION_ZONE);
  if (edgeXn < REPULSION_ZONE) bvx += REPULSION_STRENGTH * (1 - edgeXn / REPULSION_ZONE);
  if (edgeZp < REPULSION_ZONE) bvz -= REPULSION_STRENGTH * (1 - edgeZp / REPULSION_ZONE);
  if (edgeZn < REPULSION_ZONE) bvz += REPULSION_STRENGTH * (1 - edgeZn / REPULSION_ZONE);

  if (bx > halfSize) { bx = halfSize; bvx *= -BOUNCE_FACTOR; }
  if (bx < -halfSize) { bx = -halfSize; bvx *= -BOUNCE_FACTOR; }
  if (bz > halfSize) { bz = halfSize; bvz *= -BOUNCE_FACTOR; }
  if (bz < -halfSize) { bz = -halfSize; bvz *= -BOUNCE_FACTOR; }

  const by = surfaceHeight(bx, bz, t) + 0.4;
  ball.position.set(bx, by, bz);
  glow.position.copy(ball.position);
  glow.scale.setScalar(1 + 0.15 * Math.sin(t * 3));

  // Trail update
  trailPoints[trailIdx % MAX_TRAIL].set(bx, by - 0.1, bz);
  trailIdx++;
  const trailPositions = trail.geometry.attributes.position.array;
  for (let i = 0; i < MAX_TRAIL; i++) {
    const idx = (trailIdx - MAX_TRAIL + i + MAX_TRAIL * 2) % MAX_TRAIL;
    trailPositions[i * 3] = trailPoints[idx].x;
    trailPositions[i * 3 + 1] = trailPoints[idx].y;
    trailPositions[i * 3 + 2] = trailPoints[idx].z;
  }
  trail.geometry.attributes.position.needsUpdate = true;

  // Update ball tier label
  const tierName = getTierName(by - 0.4);
  ballLabel.textContent = tierName;
  const screenPos = ball.position.clone().project(camera);
  const sx = (screenPos.x * 0.5 + 0.5) * window.innerWidth;
  const sy = (-screenPos.y * 0.5 + 0.5) * window.innerHeight;
  ballLabel.style.left = (sx + 15) + 'px';
  ballLabel.style.top = (sy - 10) + 'px';
  ballLabel.style.opacity = '0.6';

  // Gentle camera orbit
  camera.position.x = 18 * Math.cos(t * 0.03) + 4 * Math.sin(t * 0.02);
  camera.position.z = 22 * Math.sin(t * 0.03) + 4 * Math.cos(t * 0.02);
  camera.position.y = 14 + 2 * Math.sin(t * 0.05);
  camera.lookAt(0, -1, 0);

  // Essence light pulse
  essenceLight.intensity = 0.5 + 0.2 * Math.sin(t * 1.5);

  renderer.render(scene, camera);
}

animate();

// Resize handler
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1a1a18"/>
    </linearGradient>
    <linearGradient id="t1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E8C872" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#D4A843" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="t2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#A0B4C8" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#7A9AB5" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="t3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8BA89A" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#6B8F7E" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="t4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9A8A9E" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#7A6A7E" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="exec" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C47A5A" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#A45A3A" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
  </g>

  <!-- Tier bars — left side, stacked pyramid -->
  <!-- Tier 1: Strategy (WHY) — narrowest, top -->
  <rect x="60" y="72" width="280" height="44" rx="4" fill="url(#t1)"/>
  <text x="200" y="100" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', sans-serif" font-size="13" font-weight="600" fill="#1a1a18" letter-spacing="2">STRATEGY</text>

  <!-- Tier 2: Doctrine (WHAT) -->
  <rect x="40" y="128" width="320" height="44" rx="4" fill="url(#t2)"/>
  <text x="200" y="156" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', sans-serif" font-size="13" font-weight="600" fill="#1a1a18" letter-spacing="2">DOCTRINE</text>

  <!-- Tier 3: Procedure (HOW) -->
  <rect x="20" y="184" width="360" height="44" rx="4" fill="url(#t3)"/>
  <text x="200" y="212" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', sans-serif" font-size="13" font-weight="600" fill="#1a1a18" letter-spacing="2">PROCEDURE</text>

  <!-- Tier 4: Playbook (PATTERNS) -->
  <rect x="0" y="240" width="400" height="44" rx="4" fill="url(#t4)"/>
  <text x="200" y="268" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', sans-serif" font-size="13" font-weight="600" fill="#1a1a18" letter-spacing="2">PLAYBOOK</text>

  <!-- Execution bar -->
  <rect x="0" y="308" width="400" height="3" rx="1.5" fill="url(#exec)"/>
  <text x="200" y="330" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', sans-serif" font-size="10" fill="#666660" letter-spacing="3" font-weight="400">EXECUTION</text>

  <!-- Tier keywords — right of bars -->
  <text x="420" y="100" font-family="-apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#E8C872" opacity="0.7" letter-spacing="1">WHY</text>
  <text x="420" y="156" font-family="-apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#A0B4C8" opacity="0.7" letter-spacing="1">WHAT</text>
  <text x="420" y="212" font-family="-apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#8BA89A" opacity="0.7" letter-spacing="1">HOW</text>
  <text x="420" y="268" font-family="-apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#9A8A9E" opacity="0.7" letter-spacing="1">PATTERNS</text>
  <text x="420" y="330" font-family="-apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#C47A5A" opacity="0.5" letter-spacing="1">NOW</text>

  <!-- Title — right side -->
  <text x="560" y="120" font-family="'Georgia', 'Times New Roman', serif" font-size="52" fill="#e8e6de" font-weight="400" letter-spacing="-1">praxeology</text>

  <!-- Tagline -->
  <text x="562" y="155" font-family="-apple-system, 'Helvetica Neue', sans-serif" font-size="13" fill="#888880" letter-spacing="1.5" font-weight="300">HIERARCHICAL GOVERNANCE FOR PURPOSEFUL ACTION</text>
  <text x="562" y="172" font-family="-apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#666660" letter-spacing="0.8" font-weight="300">Human–AI Collaborative Operating System</text>

  <!-- Thin separator -->
  <line x1="562" y1="188" x2="780" y2="188" stroke="#444440" stroke-width="0.5"/>

  <!-- Isomorphism hint -->
  <text x="562" y="215" font-family="-apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#666660" letter-spacing="0.5">
    <tspan x="562" dy="0">Constitution · Doctrine · Regulation · Habit · Execution</tspan>
    <tspan x="562" dy="20" fill="#555550">One pattern — every scale — humans and AI, governed together.</tspan>
  </text>

  <!-- Domain dots -->
  <g transform="translate(562, 260)">
    <circle cx="0" cy="0" r="4" fill="#E8C872" opacity="0.6"/>
    <text x="14" y="4" font-family="-apple-system, sans-serif" font-size="10" fill="#888880">Nations</text>

    <circle cx="100" cy="0" r="4" fill="#A0B4C8" opacity="0.6"/>
    <text x="114" y="4" font-family="-apple-system, sans-serif" font-size="10" fill="#888880">Armies</text>

    <circle cx="195" cy="0" r="4" fill="#8BA89A" opacity="0.6"/>
    <text x="209" y="4" font-family="-apple-system, sans-serif" font-size="10" fill="#888880">Companies</text>

    <circle cx="310" cy="0" r="4" fill="#9A8A9E" opacity="0.6"/>
    <text x="324" y="4" font-family="-apple-system, sans-serif" font-size="10" fill="#888880">Individuals</text>

    <circle cx="430" cy="0" r="4" fill="#C47A5A" opacity="0.6"/>
    <text x="444" y="4" font-family="-apple-system, sans-serif" font-size="10" fill="#888880">Agentic AI</text>
  </g>

  <!-- Version badge -->
  <text x="562" y="330" font-family="-apple-system, 'Helvetica Neue', sans-serif" font-size="10" fill="#444440" letter-spacing="2">v0.1 · MIT · NeoMakes</text>
</svg>

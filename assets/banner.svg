<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" fill="none">
  <defs>
    <!-- Ocean depth gradient -->
    <linearGradient id="ocean" x1="0" y1="0" x2="0" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="15%" stop-color="#0f1628"/>
      <stop offset="40%" stop-color="#0a1020"/>
      <stop offset="70%" stop-color="#060a18"/>
      <stop offset="100%" stop-color="#030510"/>
    </linearGradient>

    <!-- Storm sky gradient -->
    <linearGradient id="storm" x1="0" y1="0" x2="0" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2a1a3e" stop-opacity="0.8"/>
      <stop offset="60%" stop-color="#1a1a2e" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0f1628" stop-opacity="0"/>
    </linearGradient>

    <!-- Lightning flash -->
    <linearGradient id="lightning" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8C84A" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#E8C84A" stop-opacity="0"/>
    </linearGradient>

    <!-- Water surface shimmer -->
    <linearGradient id="surfaceShimmer" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4A6EFF" stop-opacity="0"/>
      <stop offset="20%" stop-color="#6B8AFF" stop-opacity="0.15"/>
      <stop offset="40%" stop-color="#E8C84A" stop-opacity="0.12"/>
      <stop offset="60%" stop-color="#6B8AFF" stop-opacity="0.1"/>
      <stop offset="80%" stop-color="#4A6EFF" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#4A6EFF" stop-opacity="0"/>
    </linearGradient>

    <!-- Deep calm glow -->
    <radialGradient id="deepGlow" cx="50%" cy="85%" r="40%">
      <stop offset="0%" stop-color="#1E2FA8" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#030510" stop-opacity="0"/>
    </radialGradient>

    <!-- Tier depth colors -->
    <linearGradient id="tierExec" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C47A5A" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#E8965A" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="tierPlay" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9A7ABB" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#B89AD8" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="tierProc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5A8AAA" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#7AAACA" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="tierDoct" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3A6A9A" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#5A8ABA" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="tierStrat" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1A3A6A" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#2A4A7A" stop-opacity="0.08"/>
    </linearGradient>
  </defs>

  <!-- Ocean background -->
  <rect width="1200" height="400" fill="url(#ocean)"/>
  <rect width="1200" height="400" fill="url(#deepGlow)"/>

  <!-- ==================== -->
  <!-- STORM SURFACE (top ~100px) — chaos, turbulence, NOW -->
  <!-- ==================== -->

  <!-- Storm atmosphere -->
  <rect width="1200" height="120" fill="url(#storm)"/>

  <!-- Lightning bolt (Essence/Why — piercing from sky to deep) -->
  <path d="M 580,8 L 572,38 L 582,36 L 568,72 L 578,68 L 558,108"
        stroke="#E8C84A" stroke-width="1.5" fill="none" opacity="0.5" stroke-linecap="round"/>
  <path d="M 580,8 L 572,38 L 582,36 L 568,72 L 578,68 L 558,108"
        stroke="#E8C84A" stroke-width="4" fill="none" opacity="0.08" stroke-linecap="round"/>

  <!-- Distant lightning reflection -->
  <path d="M 920,15 L 916,35 L 922,33 L 914,55"
        stroke="#E8C84A" stroke-width="0.8" fill="none" opacity="0.2" stroke-linecap="round"/>

  <!-- Turbulent wave 1 (foreground — large, violent) -->
  <path d="M 0,95 C 40,72 80,108 120,88 C 160,68 200,105 240,92 C 280,78 320,110 360,85
           C 400,60 440,102 480,90 C 520,78 560,108 600,82 C 640,58 680,100 720,88
           C 760,75 800,105 840,85 C 880,65 920,98 960,90 C 1000,82 1040,105 1080,88
           C 1120,72 1160,95 1200,85 L 1200,110 L 0,110 Z"
        fill="#1a1a2e" opacity="0.6"/>

  <!-- Wave crest foam -->
  <path d="M 0,95 C 40,72 80,108 120,88 C 160,68 200,105 240,92 C 280,78 320,110 360,85
           C 400,60 440,102 480,90 C 520,78 560,108 600,82 C 640,58 680,100 720,88
           C 760,75 800,105 840,85 C 880,65 920,98 960,90 C 1000,82 1040,105 1080,88
           C 1120,72 1160,95 1200,85"
        fill="none" stroke="#8BA0C0" stroke-width="0.8" opacity="0.25"/>

  <!-- Turbulent wave 2 (mid — slightly smaller) -->
  <path d="M 0,105 C 50,92 100,115 150,100 C 200,85 250,112 300,102
           C 350,90 400,115 450,98 C 500,82 550,110 600,100
           C 650,88 700,115 750,98 C 800,82 850,108 900,100
           C 950,90 1000,112 1050,100 C 1100,88 1150,108 1200,98"
        fill="none" stroke="#6B8AAA" stroke-width="0.5" opacity="0.2"/>

  <!-- Surface shimmer line (water surface boundary) -->
  <path d="M 0,108 C 60,102 120,115 180,108 C 240,100 300,116 360,110
           C 420,104 480,118 540,108 C 600,98 660,114 720,110
           C 780,106 840,118 900,108 C 960,98 1020,112 1080,108
           C 1140,104 1170,112 1200,108"
        fill="none" stroke="url(#surfaceShimmer)" stroke-width="1.2"/>

  <!-- Spray particles -->
  <circle cx="358" cy="80" r="0.8" fill="#8BA0C0" opacity="0.3"/>
  <circle cx="362" cy="76" r="0.5" fill="#8BA0C0" opacity="0.2"/>
  <circle cx="478" cy="85" r="0.7" fill="#8BA0C0" opacity="0.25"/>
  <circle cx="598" cy="75" r="0.6" fill="#8BA0C0" opacity="0.2"/>
  <circle cx="718" cy="82" r="0.8" fill="#8BA0C0" opacity="0.3"/>
  <circle cx="840" cy="78" r="0.5" fill="#8BA0C0" opacity="0.2"/>

  <!-- ==================== -->
  <!-- EXEC LABEL — at the stormy surface -->
  <!-- ==================== -->
  <text x="1140" y="100" text-anchor="end" font-family="'SF Mono', 'Fira Code', monospace" font-size="8" fill="#C47A5A" opacity="0.6" letter-spacing="2">EXEC — NOW</text>
  <line x1="1145" y1="96" x2="1145" y2="108" stroke="#C47A5A" stroke-width="0.5" opacity="0.3"/>

  <!-- ==================== -->
  <!-- TRANSITION ZONE — turbulence fading -->
  <!-- ==================== -->

  <!-- Playbook depth band (~130-170) — patterns emerging from chaos -->
  <line x1="50" y1="150" x2="1150" y2="150" stroke="#9A7ABB" stroke-width="0.3" opacity="0.12" stroke-dasharray="8,12"/>
  <text x="1140" y="148" text-anchor="end" font-family="'SF Mono', 'Fira Code', monospace" font-size="7.5" fill="#9A7ABB" opacity="0.4" letter-spacing="1.5">PLAYBOOK — PATTERNS</text>

  <!-- Subtle current lines (Playbook — deterministic flows) -->
  <path d="M 80,140 C 180,135 280,145 380,138 C 480,132 580,142 680,136 C 780,130 880,140 980,135"
        fill="none" stroke="#9A7ABB" stroke-width="0.4" opacity="0.1"/>
  <path d="M 120,158 C 220,154 320,162 420,156 C 520,150 620,160 720,155 C 820,150 920,158 1020,154"
        fill="none" stroke="#9A7ABB" stroke-width="0.3" opacity="0.08"/>

  <!-- ==================== -->
  <!-- PROCEDURE ZONE (~180-230) — structured currents -->
  <!-- ==================== -->
  <line x1="50" y1="200" x2="1150" y2="200" stroke="#5A8AAA" stroke-width="0.3" opacity="0.10" stroke-dasharray="12,16"/>
  <text x="1140" y="198" text-anchor="end" font-family="'SF Mono', 'Fira Code', monospace" font-size="7.5" fill="#5A8AAA" opacity="0.35" letter-spacing="1.5">PROCEDURE — HOW</text>

  <!-- Gentle laminar flows -->
  <path d="M 60,190 C 200,187 340,193 480,189 C 620,185 760,192 900,188 C 1000,185 1100,190 1150,188"
        fill="none" stroke="#5A8AAA" stroke-width="0.3" opacity="0.08"/>
  <path d="M 40,210 C 180,208 320,213 460,209 C 600,206 740,212 880,208 C 1000,205 1100,210 1160,208"
        fill="none" stroke="#5A8AAA" stroke-width="0.25" opacity="0.06"/>

  <!-- ==================== -->
  <!-- DOCTRINE ZONE (~240-290) — deep, slow, principled -->
  <!-- ==================== -->
  <line x1="50" y1="260" x2="1150" y2="260" stroke="#3A6A9A" stroke-width="0.3" opacity="0.08" stroke-dasharray="16,20"/>
  <text x="1140" y="258" text-anchor="end" font-family="'SF Mono', 'Fira Code', monospace" font-size="7.5" fill="#3A6A9A" opacity="0.30" letter-spacing="1.5">DOCTRINE — WHAT</text>

  <!-- Almost-still deep current -->
  <path d="M 100,255 C 300,253 500,257 700,254 C 900,252 1050,256 1150,254"
        fill="none" stroke="#3A6A9A" stroke-width="0.2" opacity="0.05"/>

  <!-- ==================== -->
  <!-- STRATEGY ZONE (~300-360) — absolute stillness, the abyss -->
  <!-- ==================== -->
  <line x1="50" y1="320" x2="1150" y2="320" stroke="#1A3A6A" stroke-width="0.2" opacity="0.06" stroke-dasharray="20,24"/>
  <text x="1140" y="318" text-anchor="end" font-family="'SF Mono', 'Fira Code', monospace" font-size="7.5" fill="#1A3A6A" opacity="0.25" letter-spacing="1.5">STRATEGY — WHY</text>

  <!-- Abyssal particles (barely visible — primordial) -->
  <circle cx="200" cy="340" r="0.8" fill="#2A4A7A" opacity="0.08"/>
  <circle cx="500" cy="355" r="1" fill="#2A4A7A" opacity="0.06"/>
  <circle cx="800" cy="345" r="0.7" fill="#2A4A7A" opacity="0.07"/>
  <circle cx="1000" cy="360" r="0.9" fill="#2A4A7A" opacity="0.05"/>

  <!-- ==================== -->
  <!-- DEPTH SCALE — right edge -->
  <!-- ==================== -->
  <g opacity="0.25">
    <line x1="1170" y1="108" x2="1170" y2="380" stroke="#444460" stroke-width="0.4"/>
    <line x1="1167" y1="108" x2="1173" y2="108" stroke="#C47A5A" stroke-width="0.5"/>
    <line x1="1167" y1="150" x2="1173" y2="150" stroke="#9A7ABB" stroke-width="0.5"/>
    <line x1="1167" y1="200" x2="1173" y2="200" stroke="#5A8AAA" stroke-width="0.5"/>
    <line x1="1167" y1="260" x2="1173" y2="260" stroke="#3A6A9A" stroke-width="0.5"/>
    <line x1="1167" y1="320" x2="1173" y2="320" stroke="#1A3A6A" stroke-width="0.5"/>
  </g>

  <!-- ==================== -->
  <!-- LIGHTNING CONTINUATION — gold thread from storm to abyss -->
  <!-- (Essence: the WHY that penetrates all depths) -->
  <!-- ==================== -->
  <path d="M 558,108 L 555,150 L 552,200 L 550,260 L 548,320 L 547,380"
        stroke="#D4A017" stroke-width="0.8" fill="none" opacity="0.12"/>
  <path d="M 558,108 L 555,150 L 552,200 L 550,260 L 548,320 L 547,380"
        stroke="#D4A017" stroke-width="3" fill="none" opacity="0.03"/>

  <!-- Gold nodes where essence meets each tier -->
  <circle cx="558" cy="108" r="2" fill="#D4A017" opacity="0.5"/>
  <circle cx="555" cy="150" r="1.8" fill="#D4A017" opacity="0.35"/>
  <circle cx="552" cy="200" r="1.5" fill="#D4A017" opacity="0.25"/>
  <circle cx="550" cy="260" r="1.3" fill="#D4A017" opacity="0.18"/>
  <circle cx="548" cy="320" r="1.2" fill="#D4A017" opacity="0.12"/>

  <!-- Essence labels along the gold thread -->
  <text x="568" y="112" font-family="'Georgia', serif" font-size="7.5" fill="#D4A017" opacity="0.45" font-style="italic">Now</text>
  <text x="565" y="154" font-family="'Georgia', serif" font-size="7.5" fill="#D4A017" opacity="0.35" font-style="italic">Execute</text>
  <text x="562" y="204" font-family="'Georgia', serif" font-size="7.5" fill="#D4A017" opacity="0.28" font-style="italic">How</text>
  <text x="560" y="264" font-family="'Georgia', serif" font-size="7.5" fill="#D4A017" opacity="0.20" font-style="italic">What</text>
  <text x="558" y="324" font-family="'Georgia', serif" font-size="7.5" fill="#D4A017" opacity="0.15" font-style="italic">Why</text>

  <!-- ==================== -->
  <!-- TITLE — left side, emerging from depth -->
  <!-- ==================== -->

  <text x="60" y="180" font-family="'Georgia', 'Times New Roman', serif" font-size="48" fill="#E8E6DE" font-weight="400" letter-spacing="-0.5" opacity="0.90">praxeology</text>

  <text x="62" y="208" font-family="'SF Mono', 'Fira Code', monospace" font-size="9.5" fill="#7A8A9A" letter-spacing="2" font-weight="400">HIERARCHICAL GOVERNANCE FOR PURPOSEFUL ACTION</text>

  <!-- Thin separator -->
  <line x1="62" y1="220" x2="420" y2="220" stroke="#3A4A5A" stroke-width="0.4"/>

  <!-- Domain cross-references -->
  <g font-family="'SF Mono', 'Fira Code', monospace" font-size="8" opacity="0.35">
    <text x="62" y="242" fill="#8BA0C0" letter-spacing="0.5">Constitution · Doctrine · Regulation · Habit · Enforcement</text>
    <text x="62" y="258" fill="#7A8A9A" letter-spacing="0.5">National Strategy · OPLAN · SOP · TTP · FRAGO</text>
    <text x="62" y="274" fill="#6A7A8A" letter-spacing="0.5">J(x) · g(x) ≤ 0 · π(s,a) · y = f(x) · Δe → Kalman</text>
  </g>

  <!-- Tagline -->
  <text x="62" y="310" font-family="'Georgia', serif" font-size="11" fill="#5A6A7A" font-style="italic" opacity="0.45">The deeper the principle, the stiller the water.</text>

  <!-- Domain dots -->
  <g transform="translate(62, 340)">
    <circle cx="0" cy="0" r="2.5" fill="#C47A5A" opacity="0.35"/>
    <text x="10" y="3" font-family="'SF Mono', monospace" font-size="7.5" fill="#5A6A7A" opacity="0.35">Nations</text>

    <circle cx="75" cy="0" r="2.5" fill="#5A8AAA" opacity="0.35"/>
    <text x="85" y="3" font-family="'SF Mono', monospace" font-size="7.5" fill="#5A6A7A" opacity="0.35">Armies</text>

    <circle cx="145" cy="0" r="2.5" fill="#3A6A9A" opacity="0.35"/>
    <text x="155" y="3" font-family="'SF Mono', monospace" font-size="7.5" fill="#5A6A7A" opacity="0.35">Companies</text>

    <circle cx="235" cy="0" r="2.5" fill="#9A7ABB" opacity="0.35"/>
    <text x="245" y="3" font-family="'SF Mono', monospace" font-size="7.5" fill="#5A6A7A" opacity="0.35">Individuals</text>

    <circle cx="325" cy="0" r="2.5" fill="#1A3A6A" opacity="0.35"/>
    <text x="335" y="3" font-family="'SF Mono', monospace" font-size="7.5" fill="#5A6A7A" opacity="0.35">Deep Learning</text>
  </g>

  <!-- Version -->
  <text x="62" y="375" font-family="'SF Mono', 'Fira Code', monospace" font-size="7.5" fill="#3A4A5A" letter-spacing="2" opacity="0.35">v0.1 · MIT · NeoMakes</text>
</svg>

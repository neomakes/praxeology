# Tool Bindings — Map abstract capabilities to concrete tools
# Override these for your environment. Praxeology procedures reference
# the abstract names (left side), your tools fill in the right side.

autonomous_mode: ralph          # or: aider, cursor, copilot, manual
qa_test: /qa                    # or: pytest, jest, cargo test, manual
debug: /investigate             # or: gdb, lldb, manual debugging
code_review: /review            # or: gh pr review, manual review
deploy: /ship                   # or: gh actions, vercel, manual deploy
documentation: /document-release # or: manual doc update
planning: /plan                 # or: notion, linear, manual planning

# If a tool is not available, procedures fall back to manual execution.
# See each PRC/PLY document for manual fallback instructions.
